# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

name: ubuntu-insights-web-service

type: charm

base: ubuntu@24.04

# the platforms this charm should be built on and run on.
# you can check your architecture with `dpkg --print-architecture`
platforms:
  amd64:

# (Required)
summary: Web service for ubuntu-insights.

# (Required)
description: |
  Ubuntu Insights web services used for accepting HTTP requests with insights reports from clients.
  This service is part of the Ubuntu Insights project, a transparent, user-friendly, open,
  platform-agnostic, and cross-application solution for reporting hardware information and other collected metrics.

links:
  source:
    - https://github.com/ubuntu/ubuntu-insights
    
extensions:
  - go-framework

# Uncomment the integrations used by your application
# Integrations set to "optional: false" will block the charm
# until the applications are integrated.
requires:
  static-config:
    interface: secret
  dynamic-config:
    interface: secret

storage: 
  reports-cache:
    type: filesystem
    location: /var/lib/ubuntu-insights/
    read-only: false